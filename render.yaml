services:
  # 1. PostgreSQL Database
  - type: db
    name: jobtracker-db
    databaseName: jobtracker
    user: jobtracker
    plan: free # Change to starter for better performance

  # 2. Rails API
  - type: web
    name: jobtracker-api
    env: docker
    dockerContext: api
    dockerFilePath: api/Dockerfile
    plan: free # Change to starter to avoid cold starts
    healthCheckPath: /up
    envVars:
      - key: RAILS_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: jobtracker-db
          property: connectionString
      - key: RAILS_MASTER_KEY
        sync: false # You must set this in the Render dashboard
      - key: CORS_ALLOWED_ORIGINS
        fromService:
          type: web
          name: jobtracker-web
          property: url

  # 3. Solid Queue Worker
  - type: worker
    name: jobtracker-worker
    env: docker
    dockerContext: api
    dockerFilePath: api/Dockerfile
    plan: starter # Render Workers require at least starter plan
    dockerCommand: ./bin/jobs
    envVars:
      - key: RAILS_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: jobtracker-db
          property: connectionString
      - key: RAILS_MASTER_KEY
        sync: false

  # 4. React Frontend
  - type: web
    name: jobtracker-web
    env: static
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    rootDir: web
    plan: free
    envVars:
      - key: VITE_API_BASE_URL
        fromService:
          type: web
          name: jobtracker-api
          property: url
